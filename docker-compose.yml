services:
  app:
    build:
      context: .
      target: backend
    image: sap-b1-agent-backend:latest
    container_name: sap-b1-backend
    env_file:
      - .env
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - sap-b1-net

  nginx:
    build:
      context: .
      target: frontend
    image: sap-b1-agent-frontend:latest
    container_name: sap-b1-nginx
    ports:
      - "8080:80"
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - sap-b1-net

networks:
  sap-b1-net:
    driver: bridge
