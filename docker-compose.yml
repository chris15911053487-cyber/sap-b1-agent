services:
  sap-b1-agent:
    build:
      context: .
      dockerfile: Dockerfile
    image: sap-b1-db-agent:latest
    container_name: sap-b1-agent
    stdin_open: true
    tty: true
    env_file:
      - .env
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - AGENT_ENV=${AGENT_ENV:-development}
    volumes:
      - ./config:/app/config:ro
      - ./logs:/app/logs
      - ./data:/app/data
    network_mode: "host"
    restart: unless-stopped
